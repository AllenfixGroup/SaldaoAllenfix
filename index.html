<style>
/* ===== RESET DO EXCEL ===== */
body {
  font-family: 'Segoe UI', Arial, sans-serif !important;
  margin: 16px !important;
  background: #fff !important;
}

[id*="tab"], [id*="Tab"],
[class*="tab"], [class*="Tab"],
.MsoNormalTable,
br { 
  display: none !important; 
}

/* ===== TABELA (DESKTOP) ===== */
table {
  border-collapse: collapse !important;
  width: 100% !important;
  table-layout: auto !important;
  position: static !important;
}

td, th {
  position: static !important;
  font-family: 'Segoe UI', Arial, sans-serif !important;
  font-size: 13px !important;
  padding: 7px 14px !important;
  border: none !important;
  border-bottom: 1px solid #e5e7eb !important;
  white-space: nowrap !important; /* No PC, mantém em uma linha */
  vertical-align: middle !important;
}

/* ===== CABEÇALHO ===== */
tr:first-child td {
  background: #1a2332 !important;
  color: #ffffff !important;
  font-weight: 700 !important;
  font-size: 12px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.4px !important;
  border: 1px solid #2d3f55 !important;
  padding: 10px 14px !important;
}

/* ===== LINHAS ZEBRADAS ===== */
tr:nth-child(even) td { background: #f8fafc !important; }
tr:hover td { background: #eff6ff !important; }

/* ===== COLUNAS ESPECÍFICAS (DESKTOP) ===== */
td:nth-child(1) { min-width: 320px !important; }
td:nth-child(2) { min-width: 100px !important; text-align: right !important; }
td:nth-child(3) { min-width: 90px !important; text-align: right !important; }
td:nth-child(4) { min-width: 140px !important; text-align: right !important; color: #1d4ed8 !important; font-weight: 600 !important; }
td:nth-child(5) { min-width: 130px !important; text-align: right !important; color: #059669 !important; font-weight: 600 !important; }

/* ===== AJUSTES PARA CELULAR (ENQUADRAMENTO AUTOMÁTICO) ===== */
@media (max-width: 768px) {
  body {
    margin: 8px !important;
  }

  table {
    table-layout: fixed !important; /* Força a tabela a respeitar o limite da tela */
    width: 100% !important;
    min-width: 100% !important;
  }

  td, th {
    white-space: normal !important; /* Permite que o texto quebre em várias linhas */
    word-wrap: break-word !important;
    padding: 8px 4px !important; /* Reduz o espaçamento interno */
    font-size: 11px !important; /* Reduz a fonte para caber melhor */
    vertical-align: top !important; /* Alinha o texto no topo quando a linha cresce */
  }

  /* Redefine as larguras para porcentagens da tela do celular */
  td:nth-child(1) { width: 36% !important; min-width: auto !important; } /* Descrição ganha mais espaço */
  td:nth-child(2) { width: 14% !important; min-width: auto !important; } /* Peso Total */
  td:nth-child(3) { width: 14% !important; min-width: auto !important; } /* Peso CT */
  td:nth-child(4) { width: 18% !important; min-width: auto !important; } /* ICMS 18% */
  td:nth-child(5) { width: 18% !important; min-width: auto !important; } /* ICMS 4% */
}
</style>
</head>
