<!-- Tag essencial para responsividade no celular -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET DO EXCEL ===== */
body {
  font-family: 'Segoe UI', Arial, sans-serif !important;
  margin: 16px !important;
  background: #fff !important;
}

/* Esconde menu de baixo, scrollbar do Excel e tabstrip */
[id*="tab"], [id*="Tab"],
[class*="tab"], [class*="Tab"],
.MsoNormalTable,
br { 
  display: none !important; 
}

/* ===== CONTÊINER RESPONSIVO (NOVO) ===== */
.table-responsive-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch; /* Rolagem suave no iOS */
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05); /* Sombra leve opcional */
}

/* ===== TABELA ===== */
table {
  border-collapse: collapse !important;
  width: 100% !important;
  table-layout: auto !important;
  position: static !important;
  min-width: 700px !important; /* Garante que a tabela não seja esmagada */
}

/* Remove posicionamento absoluto que o Excel usa */
td, th {
  position: static !important;
  font-family: 'Segoe UI', Arial, sans-serif !important;
  font-size: 13px !important;
  padding: 7px 14px !important;
  border: none !important;
  border-bottom: 1px solid #e5e7eb !important;
  white-space: nowrap !important;
  vertical-align: middle !important;
}

/* ===== CABEÇALHO ===== */
tr:first-child td {
  background: #1a2332 !important;
  color: #ffffff !important;
  font-weight: 700 !important;
  font-size: 12px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.4px !important;
  border: 1px solid #2d3f55 !important;
  padding: 10px 14px !important;
}

/* ===== LINHAS ZEBRADAS ===== */
tr:nth-child(even) td {
  background: #f8fafc !important;
}

tr:hover td {
  background: #eff6ff !important;
}

/* ===== COLUNAS ESPECÍFICAS ===== */
/* DESCRICAO — coluna 1 */
td:nth-child(1) {
  min-width: 280px !important;
  max-width: 480px !important;
  white-space: nowrap !important;
}

/* PESO TOTAL — coluna 2 */
td:nth-child(2) {
  min-width: 90px !important;
  text-align: right !important;
}

/* PESO CT — coluna 3 */
td:nth-child(3) {
  min-width: 80px !important;
  text-align: right !important;
}

/* R$ ICMS 18% — coluna 4 */
td:nth-child(4) {
  min-width: 120px !important;
  text-align: right !important;
  color: #1d4ed8 !important;
  font-weight: 600 !important;
}

/* R$ ICMS 4% — coluna 5 */
td:nth-child(5) {
  min-width: 120px !important;
  text-align: right !important;
  color: #059669 !important;
  font-weight: 600 !important;
}

/* ===== SCROLLBAR DISCRETA ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
::-webkit-scrollbar-thumb { background: #c1c9d2; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

/* ===== AJUSTES PARA CELULAR (NOVO) ===== */
@media (max-width: 768px) {
  body {
    margin: 8px !important;
  }
  td, th {
    padding: 8px 10px !important; /* Reduz o espaçamento interno */
    font-size: 12px !important; /* Fonte ligeiramente menor */
  }
}
</style>
